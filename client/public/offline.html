<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — Recipes</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #0f172a;
        --muted: #64748b;
        --accent: #f97316;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --fg: #f8fafc;
          --muted: #94a3b8;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        text-align: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.6rem 1.25rem;
        border-radius: 0.5rem;
        background: var(--accent);
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
      svg {
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5" aria-hidden="true">
        <path d="M1 9a16 16 0 0 1 22 0M5 13a10.5 10.5 0 0 1 14 0M8.5 17a5.5 5.5 0 0 1 7 0M12 21h.01M2 2l20 20" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>You're offline</h1>
      <p>
        This page hasn't been saved for offline use yet. Check your connection, or head
        to your favorites — they're always available offline.
      </p>
      <a href="/favorites">View favorites</a>
    </div>
  </body>
</html>
